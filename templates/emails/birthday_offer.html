<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:32px;font-family:Georgia,serif;background:#f8f1e8;">
  <div style="max-width:480px;margin:0 auto;background:#fff;border-radius:20px;padding:36px;">
    <h1 style="font-size:1.6rem;color:#4b2f1f;margin:0 0 8px;">Boho Bloom</h1>
    <p style="color:#7b5738;font-size:0.85rem;margin:0 0 28px;">Luxury Salon — Hanamkonda, Warangal</p>
    <p style="color:#4b2f1f;font-size:0.95rem;">Happy Birthday, {{ name }}!</p>
    <p style="color:#7b5738;font-size:0.95rem;">
      Celebrate your special day with us. Enjoy <strong>{{ offer }}</strong> on your next visit.
    </p>
    <div style="margin:24px 0;text-align:center;">
      <span style="display:inline-block;padding:16px 32px;font-size:1.2rem;font-weight:700;
                   background:#f8f1e8;border-radius:14px;color:#4b2f1f;">
        {{ offer }}
      </span>
    </div>
    <p style="color:#b48860;font-size:0.85rem;">
      Offer expires in {{ expiry }} days. Present this email at the salon.
    </p>
    <hr style="border:none;border-top:1px solid #ead8c3;margin:28px 0 18px;">
    <p style="color:#b48860;font-size:0.78rem;">
      {{ business_name }} — Hanamkonda, Warangal
    </p>
  </div>
</body>
</html>
