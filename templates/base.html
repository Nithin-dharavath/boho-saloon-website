<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4b2f1f">
  <title>{% block title %}{{ seo.title if seo else "Boho Bloom Luxury Salon" }}{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://accounts.google.com">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap"></noscript>

  {% if seo %}
  <meta name="description" content="{{ seo.description }}">
  <meta name="keywords" content="{{ seo.keywords }}">
  <meta name="robots" content="{{ seo.robots }}">
  <link rel="canonical" href="{{ seo.canonical }}">

  <meta property="og:title" content="{{ seo.title }}">
  <meta property="og:description" content="{{ seo.description }}">
  <meta property="og:image" content="{{ seo.og_image }}">
  <meta property="og:url" content="{{ seo.canonical }}">
  <meta property="og:type" content="{{ seo.og_type }}">
  <meta property="og:site_name" content="{{ seo.site_name }}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ seo.title }}">
  <meta name="twitter:description" content="{{ seo.description }}">
  <meta name="twitter:image" content="{{ seo.og_image }}">

  <meta name="geo.region" content="IN-TS">
  <meta name="geo.placename" content="Hanamkonda, Warangal, Telangana">
  <meta name="geo.position" content="18.0079;79.5767">
  <meta name="ICBM" content="18.0079, 79.5767">
  {% endif %}

  {% if GOOGLE_SITE_VERIFICATION %}
  <meta name="google-site-verification" content="{{ GOOGLE_SITE_VERIFICATION }}">
  {% endif %}

  {% block extra_head %}{% endblock %}
  <link rel="stylesheet" href="/static/css/style.css?v=2">

  {% if GA_MEASUREMENT_ID %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ GA_MEASUREMENT_ID }}"></script>
  <script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ GA_MEASUREMENT_ID }}');
  </script>
  {% endif %}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  {% block content %}{% endblock %}

  {% block scripts %}{% endblock %}

  {% if not user %}
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
  function initGoogleIdentity() {
    if (typeof google === 'undefined' || !google.accounts) return;
    google.accounts.id.initialize({
      client_id: '{{ GOOGLE_CLIENT_ID }}',
      callback: handleGoogleCredential,
      auto_select: false,
      cancel_on_tap_outside: false,
    });
    var btn = document.getElementById('google-signin-btn');
    if (btn) {
      google.accounts.id.renderButton(btn, {
        theme: 'outline', size: 'large', text: 'continue_with', width: 350,
      });
    }
    google.accounts.id.prompt();
  }
  window.onload = initGoogleIdentity;
  </script>
  {% endif %}

  <script>
  async function handleGoogleCredential(response) {
    try {
      const res = await fetch('/auth/google', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: response.credential }),
      });
      const data = await res.json();
      if (data.ok) {
        if (data.needs_profile) {
          window.location.href = '/profile/setup';
        } else {
          window.location.href = window.location.pathname;
        }
      } else {
        console.error('Google sign-in error:', data.error);
      }
    } catch (err) {
      console.error('Google sign-in network error:', err);
    }
  }
  </script>
</body>
</html>
